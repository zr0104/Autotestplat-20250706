<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.querySelector('.main-content');
    sidebar.classList.toggle('collapsed');

    // 立即更新主内容区域的margin
    if (sidebar.classList.contains('collapsed')) {
        if (mainContent) {
            mainContent.style.marginLeft = '60px';
        }
    } else {
        if (mainContent) {
            mainContent.style.marginLeft = '250px';
        }
    }

    localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
}

function toggleSubmenu(element) {
    const parentItem = element.parentElement;
    parentItem.classList.toggle('open');

    // 展开/收起子菜单时，确保退出登录按钮保持在底部
    setTimeout(() => {
        adjustFooterPosition();
    }, 300);
}

// 调整底部退出登录按钮位置
function adjustFooterPosition() {
    const sidebar = document.getElementById('sidebar');
    const footer = document.querySelector('.sidebar-footer-fixed');
    const menu = document.querySelector('.sidebar-menu');

    if (!footer || !menu) return;

    // 计算菜单的实际高度
    const menuHeight = menu.offsetHeight;
    const sidebarHeight = sidebar.offsetHeight;
    const headerHeight = document.querySelector('.sidebar-header').offsetHeight;
    const productSelectHeight = document.querySelector('.sidebar-product-select').offsetHeight;

    // 如果菜单内容较少，让footer固定在底部
    const contentHeight = headerHeight + productSelectHeight + menuHeight;

    if (contentHeight < sidebarHeight - 60) {
        footer.style.position = 'absolute';
        footer.style.bottom = '0';
    } else {
        footer.style.position = 'relative';
        footer.style.bottom = 'auto';
    }
}

window.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.querySelector('.main-content');
    const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';

    if (isCollapsed) {
        sidebar.classList.add('collapsed');
        if (mainContent) {
            mainContent.style.marginLeft = '60px';
        }
    }

    const currentPath = window.location.pathname;
    const menuLinks = document.querySelectorAll('.sidebar-link[data-menu]');

    menuLinks.forEach(function(link) {
        if (link.getAttribute('href') === currentPath ||
            link.getAttribute('data-menu') && currentPath.includes(link.getAttribute('data-menu'))) {
            link.classList.add('active');

            const parentItem = link.closest('.sidebar-item');
            if (parentItem && parentItem.querySelector('.sidebar-submenu')) {
                parentItem.classList.add('open');
            }
        }
    });

    // 初始化时调整footer位置
    adjustFooterPosition();
});

// 监听窗口大小变化
window.addEventListener('resize', function() {
    adjustFooterPosition();
});
</script>
