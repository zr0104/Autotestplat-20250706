    <meta charset="UTF-8">

    <link href="/static/css/dt.css" rel="stylesheet" type="text/css">
    <link href="/static/css/navbar.css" rel="stylesheet" type="text/css">
    <script src="/static/vendors/jquery/dist/jquery.min.js" type="text/javascript"></script>
    <script src="/static/vendors/popper.js/dist/umd/popper.min.js"></script>
    <script src="/static/src/localfiles/bootstrap.min.js"></script>
    <script src="/static/src/localfiles/jquery.dataTables.min.js"></script>

    <script>
        window.onload = function(){
            if(loginVerify() == 200){
                var selectElement = document.getElementById('select-option');
                if (selectElement) {
                    var options = selectElement.options;
                    for (var i = 0; i < options.length; i++) {
                        var p_name="{{ product_name }}".substring(0, 15)
                        if (options[i].text.substring(0, 14) === "{{ product_name }}".substring(0, 14)) {
                            options[i].style.display = 'none';
                            break;
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .ai-chat-container {
            width: 100%;
            height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            background: #fff;
            margin-top: 60px;
            padding: 0;
        }
        .ai-chat-header {
            background: #00acf0;
            color: #fff;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fa;
        }
        .ai-message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        .ai-message.user {
            justify-content: flex-end;
        }
        .ai-message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }
        .ai-message.user .ai-message-content {
            background: #00acf0;
            color: #fff;
        }
        .ai-message.assistant .ai-message-content {
            background: #e8ecef;
            color: #324148;
        }
        .ai-message.assistant .ai-message-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .ai-message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin: 0 10px;
            flex-shrink: 0;
        }
        .ai-message.user .ai-message-avatar {
            background: #00acf0;
            color: #fff;
            order: 2;
        }
        .ai-message.assistant .ai-message-avatar {
            background: #324148;
            color: #fff;
        }
        .ai-chat-input-area {
            display: flex;
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid #e8ecef;
        }
        .ai-chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            font-family: "Roboto", sans-serif;
        }
        .ai-chat-input:focus {
            border-color: #00acf0;
        }
        .ai-chat-send {
            background: #00acf0;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .ai-chat-send:hover {
            background: #0098d6;
        }
        .ai-chat-send:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .ai-typing {
            display: flex;
            align-items: center;
            padding: 4px 0;
            color: #5e7d8a;
            font-size: 13px;
        }
        .ai-typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #5e7d8a;
            margin-right: 4px;
            animation: ai-typing-blink 1.4s infinite;
        }
        .ai-typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .ai-typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes ai-typing-blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    {% include "nav.html" %}

    <div class="ai-chat-container">
        <div class="ai-chat-header">
            <span>🤖 AI助手 · deepseek-r1:1.5b</span>
            <button class="btn btn-sm btn-outline-light" onclick="clearChat()" title="清空对话">清空对话</button>
        </div>
        <div class="ai-chat-messages" id="aiChatMessages">
            <div class="ai-message assistant">
                <div class="ai-message-avatar">AI</div>
                <div class="ai-message-content">
                    你好！我是 AI 助手，基于 deepseek-r1:1.5b 模型。你可以向我提问测试相关问题，或让我帮你生成测试用例。
                </div>
            </div>
        </div>
        <div class="ai-chat-input-area">
            <textarea class="ai-chat-input" id="aiChatInput" placeholder="输入消息，按 Enter 发送..." rows="1"></textarea>
            <button class="ai-chat-send" id="aiChatSend" onclick="sendMessage()">发送</button>
        </div>
    </div>

</body>
</html>
