<head>
    <meta charset="UTF-8">
    <title> 个人周报 </title>
    <link href="/static/dist/css/style.css" rel="stylesheet" type="text/css">
    <link href="/static/css/dt.css" rel="stylesheet" type="text/css">
    <link href="/static/css/navbar.css" rel="stylesheet" type="text/css">
    <link href="/static/css/sidebar.css" rel="stylesheet" type="text/css">
    <script src="/static/vendors/jquery/dist/jquery.min.js" type="text/javascript"></script>
    <script src="/static/vendors/popper.js/dist/umd/popper.min.js"></script>
    <script src="/static/src/localfiles/bootstrap.min.js"></script>
    <script src="/static/src/localfiles/jquery.dataTables.min.js"></script>
    <script src="/static/src/localfiles/dataTables.bootstrap4.min.js"></script>
    <script src="/static/vendors/laydate/laydate.js" type="text/javascript"></script>
    <script src="/static/js/public.js"></script>
    <script src="/static/js/worktask.js"></script>
    <script>
        window.onload = function(){
            if(loginVerify() == 200){
                infoInit()
            }
            var selectElement = document.getElementById('select-option');
            var options = selectElement.options;
            for (var i = 0; i < options.length; i++) {
                var p_name="{{ product_name }}".substring(0, 15)
                if (options[i].text.substring(0, 14) === "{{ product_name }}".substring(0, 14)) {
                    options[i].style.display = 'none';
                    break;
                }
            }
        }
    </script>

</head>
<body>
    {% include "nav.html" %}

    <div class="main-content">
    <div id="outterDiv" class="hk-wrapper screenHeight">
        <div class="container" style="padding: 70px 20px; max-width: 1800px;">
        <section class="hk-sec-wrapper">
            <div class="row" style="padding: 0px 0px; margin: -15px 0;margin-left: 0px" id="searchFields">
                <div class="input-group"  style="width: 30%; margin-right: 50px;" >
                    <span style="font-size: 12px;height: 35px" class="input-group-text">本周日期: </span>
                    <select style="font-size: 12px;height: 35px" name="searchField" class="form-control custom-select" ></select>
                </div>
                <button class="btn btn-primary btn-sm" style="margin-left: 5%;width: 57px;height: 34px;font-size: 14px" onclick="searchClick()">查询</button>
                <button class="btn btn-primary btn-sm" style="margin-left: 20px;width: 57px;height: 34px;font-size: 14px" onclick="showAddModal(this)">添加</button>
            </div>

            <br>
            <table id="table" class="table table-hover" data-sort="false">
                <hr>
                <thead>
                    <tr>
                        <th style="width: 30px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">编号</th>
                        <th style="width: 230px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">本周日期</th>
                        <th style="width: 230px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">本周完成工作任务与总结</th>
                        <th style="width: 230px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">下周工作计划</th>
                        <th style="width: 100px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">遗留问题</th>
                        <th style="width: 100px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; " >姓名</th>
                        <th style="width: 100px;text-align: left; line-height: 0px; padding-top: 0px;font-size:14px;font-weight: bold; ">操作</th>
                    </tr>
                </thead>
            </table>
        </section>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1" role="dialog" style="display: none;" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 800px; width: 100%;" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">提交周报</h5>
                    <button class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>本周日期</span>
                        <input name="addInput1" class="form-control" disabled="disabled" placeholder="--请输入--" value={{ value }}>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>本周工作任务</span>
                        <textarea name="addInput1" class="form-control" placeholder="--请输入--" rows="4"></textarea>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>下周工作计划</span>
                        <textarea name="addInput1" class="form-control" placeholder="--请输入--" rows="4"></textarea>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>遗留问题</span>
                        <textarea name="addInput1" class="form-control" placeholder="--请输入--" rows="2" >无</textarea>
                    </div>
                </div>
                <button class="btn btn-success " style="width: 15%; margin-bottom: 10px; margin-left: 50%;transform: translate(-50%,0);" onclick="add()">确 定</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modifyModal" tabindex="-1" role="dialog" style="display: none;" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 800px; width: 100%;" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改周报</h5>
                    <button class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="input-group" style="margin-bottom: 15px;display: none">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>编号</span>
                        <input name="modInput" disabled="disabled" class="form-control" placeholder="--请输入--">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;display: none">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>本周日期</span>
                        <input name="modInput" disabled="disabled" class="form-control" placeholder="--请输入--">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>本周工作任务</span>
                        <textarea name="modInput" class="form-control" placeholder="--请输入--" rows="4"></textarea>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>下周工作计划</span>
                        <textarea name="modInput" class="form-control" placeholder="--请输入--" rows="4"></textarea>
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 160px; padding-left: 25px;"><span style="color: red;">* </span>遗留问题</span>
                        <textarea name="modInput" class="form-control" placeholder="--请输入--" rows="2"></textarea>
                    </div>
                </div>
                <button class="btn btn-success" style="width: 15%; margin-bottom: 10px; margin-left: 50%;transform: translate(-50%,0);" onclick="mod()">保 存</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog" style="display: none;" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">删除确认</h5>
                    <button class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="input-group" style="margin-bottom: 15px;display: none">
                        <span class="input-group-text" style="width: 130px; padding-left: 25px;">姓名</span>
                        <input name="delInput" disabled="disabled" class="form-control">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;display: none;">
                        <span class="input-group-text" style="width: 130px; padding-left: 25px;">本周工作任务与总结</span>
                        <input name="delInput" disabled="disabled" class="form-control">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;display: none;">
                        <span class="input-group-text" style="width: 130px; padding-left: 25px;">下周工作</span>
                        <input name="delInput" disabled="disabled" class="form-control">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;display: none;">
                        <span class="input-group-text" style="width: 130px; padding-left: 25px;">遗留问题</span>
                        <input name="delInput" disabled="disabled" class="form-control">
                    </div>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <span class="input-group-text" style="width: 130px; padding-left: 25px;">编码</span>
                        <input name="delInput" disabled="disabled" class="form-control">
                    </div>
                </div>

                <button class="btn btn-danger" style="width: 15%; margin-bottom: 10px; margin-left: 50%;transform: translate(-50%,0);" onclick="del(this)">确 定</button>
            </div>
        </div>
    </div>
    </div>

</body>
</html>
